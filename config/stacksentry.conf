# StackSentry Configuration
# Override these with CLI flags: --profile, --region, --output

# AWS Settings
STACKSENTRY_AWS_PROFILE="default"
STACKSENTRY_AWS_REGION="us-east-1"

# Output Settings
STACKSENTRY_OUTPUT_FORMAT="table"    # table | json | csv
STACKSENTRY_REPORT_DIR="reports"
STACKSENTRY_LOG_DIR="logs"
STACKSENTRY_LOG_LEVEL="INFO"        # DEBUG | INFO | WARN | ERROR

# Alert Settings
STACKSENTRY_SLACK_WEBHOOK=""
STACKSENTRY_EMAIL_TO=""
STACKSENTRY_EMAIL_FROM="stacksentry@localhost"

# Scoring Thresholds (numeric score -> severity)
STACKSENTRY_SCORE_CRITICAL=9
STACKSENTRY_SCORE_HIGH=7
STACKSENTRY_SCORE_MEDIUM=4
STACKSENTRY_SCORE_LOW=1
